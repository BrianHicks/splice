name: CI

on:
  push:

env:
  MISE_TASK_OUTPUT: keep-order
  # cf. https://github.com/jdx/mise-action/issues/215
  MISE_RUSTUP_HOME: /home/runner/.local/share/mise/rustup
  MISE_CARGO_HOME: /home/runner/.local/share/mise/cargo

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: jdx/mise-action@v4
      - uses: Swatinem/rust-cache@v2
      - run: mise --locked --continue-on-error run ci
